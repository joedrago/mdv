<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval'; img-src 'self' data: file:; font-src 'self'"
        />
        <title>Markdown Viewer</title>
        <link rel="stylesheet" href="styles/app.css" />
        <link rel="stylesheet" href="styles/toc.css" />
        <link rel="stylesheet" href="styles/find.css" />
        <link rel="stylesheet" href="styles/bookmarks.css" />
        <link id="theme-link" rel="stylesheet" href="../themes/github-light.css" />
        <link rel="stylesheet" href="../vendor/prism.css" />
        <link rel="stylesheet" href="../vendor/katex.min.css" />
    </head>
    <body>
        <div id="tab-bar" class="hidden"></div>
        <div id="main-container">
            <div id="toc-sidebar" class="hidden"></div>
            <div id="toc-resize-handle" class="hidden"></div>
            <div id="content-area">
                <div id="empty-state">
                    <div class="empty-icon">📄</div>
                    <h2>Markdown Viewer</h2>
                    <p>Drop a Markdown file here<br />or press <kbd>Cmd+O</kbd> to open</p>
                </div>
            </div>
        </div>

        <script src="../vendor/prism.js"></script>
        <script src="../vendor/prism-autoloader.min.js"></script>
        <script src="../vendor/mermaid.min.js"></script>
        <script src="../vendor/katex.min.js"></script>
        <script src="../vendor/auto-render.min.js"></script>
        <script src="tabs.js"></script>
        <script src="markdown.js"></script>
        <script src="toc.js"></script>
        <script src="themes.js"></script>
        <script src="links.js"></script>
        <script src="settings.js"></script>
        <script src="cursor.js"></script>
        <script src="find.js"></script>
        <script src="bookmarks.js"></script>
        <script src="index.js"></script>
    </body>
</html>
